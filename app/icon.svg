<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <!-- Shiny sphere gradient -->
    <radialGradient id="sphere" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#F06060"/>
      <stop offset="50%" stop-color="#E03030"/>
      <stop offset="100%" stop-color="#A01818"/>
    </radialGradient>
    <!-- Specular highlight -->
    <radialGradient id="highlight" cx="38%" cy="30%" r="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Pink rounded background -->
  <rect width="32" height="32" rx="7" fill="#FCC0DB"/>
  <!-- Pin stick -->
  <line x1="17.5" y1="10" x2="14" y2="27" stroke="#666666" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Pin head — shiny sphere -->
  <circle cx="17.5" cy="10" r="5.5" fill="url(#sphere)"/>
  <circle cx="17.5" cy="10" r="5.5" fill="url(#highlight)"/>
</svg>
